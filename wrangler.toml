compatibility_date = "2023-10-16"
main = "src/index.ts"
name = "r2-webdav"

compatibility_flags = ["nodejs_compat"]

# Bind an R2 Bucket. Use R2 to store arbitrarily large blobs of data, such as files.
# Docs: https://developers.cloudflare.com/r2/api/workers/workers-api-usage/
[[r2_buckets]]
binding = "bucket" # <~ valid JavaScript variable name
bucket_name = "lava" # <~ target r2 bucket

# WebDAV accounts: key `user:<username>`, value `{"password":"..."}`.
# Seed with: wrangler kv key put "user:foo" '{"password":"..."}' --binding=users --remote
[[kv_namespaces]]
binding = "users" # <~ target kv
id = "d4d6111b10104e218668c715e093df8d" # <~ also comes with an id

# Docs: https://developers.cloudflare.com/workers/observability/logs/workers-logs/#enable-workers-logs
[observability]
enabled = true
head_sampling_rate = 1
